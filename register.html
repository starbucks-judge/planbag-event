<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행사 등록</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --accent: #1a1a2e;
  --accent-light: #f0f0f8;
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e8e6de;
  --text: #1a1917;
  --muted: #7a7870;
  --radius: 12px;
  --success: #16a34a;
  --error: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.page-hero { background: var(--accent); color: #fff; padding: 32px 20px 40px; text-align: center; }
.page-hero .event-badge { display: inline-block; background: rgba(255,255,255,.15); font-size: 11px; font-weight: 600; letter-spacing: .5px; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; }
.page-hero h1 { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
.page-hero .subtitle { font-size: 14px; opacity: .75; }
.page-hero .meta-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 18px; flex-wrap: wrap; }
.page-hero .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; opacity: .85; }

.form-wrap { max-width: 540px; margin: 0 auto; padding: 0 16px 60px; transform: translateY(-20px); }
.form-card { background: var(--surface); border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,.08); overflow: hidden; }
.form-section { padding: 20px; border-bottom: 1px solid var(--border); }
.form-section:last-child { border-bottom: none; }
.form-section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
.form-row { margin-bottom: 14px; }
.form-row:last-child { margin-bottom: 0; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
label .req { color: var(--error); margin-left: 3px; }
input, select, textarea { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--surface); color: var(--text); font-family: inherit; transition: border-color .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
input.error, select.error { border-color: var(--error); }
.field-error { font-size: 11px; color: var(--error); margin-top: 4px; }

.privacy-box { background: #f8f7f3; border: 1px solid var(--border); border-radius: 9px; padding: 14px; font-size: 12px; color: var(--muted); line-height: 1.7; max-height: 100px; overflow-y: auto; margin-bottom: 10px; }
.privacy-agree { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; cursor: pointer; }
.privacy-agree input { width: auto; margin-top: 1px; }

.submit-section { padding: 20px; }
.btn-submit { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
.btn-submit:hover { opacity: .9; transform: translateY(-1px); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* 완료 화면 */
.complete-wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
.complete-card { background: var(--surface); border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,.08); padding: 36px 28px; text-align: center; }
.complete-icon { width: 64px; height: 64px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.complete-icon svg { width: 32px; height: 32px; color: var(--success); }
.complete-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.complete-card p { font-size: 14px; color: var(--muted); line-height: 1.6; }
.qr-container { margin: 24px auto; background: #fff; border: 2px solid var(--border); border-radius: 12px; padding: 20px; display: inline-block; }
.qr-container canvas { display: block; }
.qr-label { font-size: 11px; color: var(--muted); margin-top: 10px; text-align: center; }
.info-table { width: 100%; text-align: left; margin-top: 20px; font-size: 13px; }
.info-table td { padding: 6px 0; }
.info-table td:first-child { color: var(--muted); width: 80px; }
.info-table td:last-child { font-weight: 500; }
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.save-qr-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--text); margin-top: 8px; font-family: inherit; }
.save-qr-btn:hover { background: var(--bg); }

/* 마감/오류 화면 */
.status-page { max-width: 400px; margin: 60px auto; padding: 20px; text-align: center; }
.status-icon { font-size: 48px; margin-bottom: 16px; }
.status-page h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.status-page p { font-size: 14px; color: var(--muted); line-height: 1.6; }

.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script>
const SUPABASE_URL = 'https://ibeaiiizgqtlzkeqlsdg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliZWFpaWl6Z3F0bHprZXFsc2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTk2OTYsImV4cCI6MjA5NjEzNTY5Nn0.KU4eYmhpS0dduvtxRRZuPbsEu1PrFgYVK-GGzDfTqvc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const eventId = new URLSearchParams(location.search).get('id');
const utmParams = Object.fromEntries(['utm_source','utm_medium','utm_campaign'].map(k => [k, new URLSearchParams(location.search).get(k) || '']));

let eventData = null;

// ── 초기화 ──
async function init() {
  if (!eventId) { showError('잘못된 접근입니다', '행사 ID가 없습니다.'); return; }
  const { data, error } = await sb.from('events').select('*').eq('id', eventId).single();
  if (error || !data) { showError('행사를 찾을 수 없습니다', '링크를 다시 확인해주세요.'); return; }
  eventData = data;
  document.title = data.title + ' — 등록';
  if (data.status === 'draft') { showStatus('비공개 행사', '현재 등록이 불가능한 행사입니다.'); return; }
  if (data.status === 'closed' || data.status === 'ended') { showStatus('접수가 마감되었습니다', '해당 행사의 참가 신청이 마감되었습니다.'); return; }
  // 정원 확인
  if (data.max_capacity) {
    const { count } = await sb.from('registrations').select('*', { count:'exact', head:true }).eq('event_id', eventId).eq('status','confirmed');
    if (count >= data.max_capacity) { showStatus('정원이 마감되었습니다', `최대 ${data.max_capacity}명 정원이 마감되었습니다.`); return; }
  }
  // 액센트 색상 적용
  document.documentElement.style.setProperty('--accent', data.color_primary || '#1a1a2e');
  renderForm(data);
}

// ── 상태 화면 ──
function showStatus(title, msg) {
  document.getElementById('app').innerHTML = `
    <div class="status-page">
      <div class="status-icon">📋</div>
      <h2>${title}</h2><p>${msg}</p>
    </div>`;
}
function showError(title, msg) {
  document.getElementById('app').innerHTML = `
    <div class="status-page">
      <div class="status-icon">⚠️</div>
      <h2>${title}</h2><p>${msg}</p>
    </div>`;
}

// ── 폼 렌더링 ──
function renderForm(ev) {
  const customFields = Array.isArray(ev.custom_fields) ? ev.custom_fields : [];
  const dateStr = formatDateRange(ev.date_start, ev.date_end);

  document.getElementById('app').innerHTML = `
    <div class="page-hero">
      <div class="event-badge">참가 신청</div>
      <h1>${ev.title}</h1>
      ${ev.subtitle ? `<p class="subtitle">${ev.subtitle}</p>` : ''}
      <div class="meta-row">
        ${ev.date_start ? `<span class="meta-item">📅 ${dateStr}</span>` : ''}
        ${ev.location_name ? `<span class="meta-item">📍 ${ev.location_name}</span>` : ''}
      </div>
    </div>

    <div class="form-wrap">
      <div class="form-card">
        <!-- 기본 정보 -->
        <div class="form-section">
          <div class="form-section-title">기본 정보</div>
          <div class="form-row">
            <label>이름<span class="req">*</span></label>
            <input type="text" id="f-name" placeholder="홍길동">
          </div>
          <div class="form-row">
            <label>이메일<span class="req">*</span></label>
            <input type="email" id="f-email" placeholder="example@company.com">
          </div>
          <div class="form-row">
            <label>휴대전화</label>
            <input type="tel" id="f-phone" placeholder="010-0000-0000">
          </div>
        </div>

        <!-- 소속 정보 -->
        <div class="form-section">
          <div class="form-section-title">소속 정보</div>
          <div class="form-row">
            <label>소속 (기관/회사)</label>
            <input type="text" id="f-org" placeholder="(주)플랜백">
          </div>
          <div class="form-row">
            <label>부서</label>
            <input type="text" id="f-dept" placeholder="마케팅팀">
          </div>
          <div class="form-row">
            <label>직함/직위</label>
            <input type="text" id="f-title" placeholder="대리">
          </div>
        </div>

        ${customFields.length ? `
        <!-- 추가 항목 -->
        <div class="form-section">
          <div class="form-section-title">추가 정보</div>
          ${customFields.map(f => `
            <div class="form-row">
              <label>${f.label}${f.required ? '<span class="req">*</span>' : ''}</label>
              ${f.type === 'text' ? `<input type="text" id="cf-${f.id}" placeholder="${f.label}">` :
                f.type === 'checkbox' ? `<label style="display:flex;align-items:center;gap:8px;font-weight:400;font-size:14px;cursor:pointer"><input type="checkbox" id="cf-${f.id}" style="width:auto"> 동의합니다</label>` :
                `<input type="text" id="cf-${f.id}" placeholder="${f.label}">`}
            </div>
          `).join('')}
        </div>
        ` : ''}

        <!-- 개인정보 동의 -->
        <div class="form-section">
          <div class="form-section-title">개인정보 수집 동의</div>
          <div class="privacy-box">
            수집 항목: 이름, 이메일, 휴대전화번호, 소속, 부서, 직함<br>
            수집 목적: 행사 참가 신청, 행사 관련 안내, 명찰 출력<br>
            보유 기간: 행사 종료 후 1년<br>
            귀하는 개인정보 수집·이용에 동의를 거부할 수 있으며, 거부 시 행사 등록이 제한될 수 있습니다.
          </div>
          <label class="privacy-agree">
            <input type="checkbox" id="f-privacy">
            <span>개인정보 수집 및 이용에 동의합니다 <span class="req">*</span></span>
          </label>
        </div>

        <div class="submit-section">
          <button class="btn-submit" id="submit-btn" onclick="submitForm()">참가 신청하기</button>
        </div>
      </div>
    </div>
  `;
}

// ── 폼 제출 ──
async function submitForm() {
  const btn = document.getElementById('submit-btn');
  // 유효성 검사
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const privacy = document.getElementById('f-privacy').checked;

  if (!name) { document.getElementById('f-name').classList.add('error'); document.getElementById('f-name').focus(); return; }
  if (!email || !email.includes('@')) { document.getElementById('f-email').classList.add('error'); document.getElementById('f-email').focus(); return; }
  if (!privacy) { alert('개인정보 수집 및 이용에 동의해주세요.'); return; }

  // 커스텀 필드 필수 체크
  const customFields = Array.isArray(eventData.custom_fields) ? eventData.custom_fields : [];
  for (const f of customFields) {
    if (f.required) {
      const el = document.getElementById('cf-' + f.id);
      if (el && !el.value.trim()) { el.classList.add('error'); el.focus(); alert(`"${f.label}" 항목을 입력해주세요.`); return; }
    }
  }

  // 중복 체크
  const { data: dup } = await sb.from('registrations').select('id').eq('event_id', eventId).eq('email', email).eq('status','confirmed').single();
  if (dup) { alert('이미 등록된 이메일 주소입니다.'); return; }

  btn.disabled = true;
  btn.textContent = '등록 중...';

  // 커스텀 필드 값 수집
  const customData = {};
  customFields.forEach(f => {
    const el = document.getElementById('cf-' + f.id);
    if (el) customData[f.label] = el.type === 'checkbox' ? el.checked : el.value.trim();
  });

  // QR 코드 생성
  const tempId = crypto.randomUUID();
  const qrCode = 'PB-' + tempId.replace(/-/g,'').toUpperCase().slice(0,16);

  const payload = {
    id: tempId,
    event_id: eventId,
    name, email,
    phone: document.getElementById('f-phone').value.trim(),
    organization: document.getElementById('f-org').value.trim(),
    department: document.getElementById('f-dept').value.trim(),
    job_title: document.getElementById('f-title').value.trim(),
    status: eventData.require_approval ? 'pending' : 'confirmed',
    qr_code: qrCode,
    custom_data: customData,
    ...utmParams
  };

  const { error } = await sb.from('registrations').insert(payload);
  if (error) {
    btn.disabled = false;
    btn.textContent = '참가 신청하기';
    alert('등록 중 오류가 발생했습니다: ' + error.message);
    return;
  }

  showComplete(payload, eventData);
}

// ── 완료 화면 ──
function showComplete(reg, ev) {
  const statusMsg = ev.require_approval
    ? '신청이 접수되었습니다. 승인 후 최종 확정됩니다.'
    : '참가 신청이 완료되었습니다. 아래 QR코드를 저장해두세요.';

  document.getElementById('app').innerHTML = `
    <div class="complete-wrap">
      <div class="complete-card">
        <div class="complete-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2>${ev.require_approval ? '신청 접수 완료' : '등록 완료!'}</h2>
        <p>${statusMsg}</p>

        <div class="qr-container" id="qr-container">
          <img id="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(reg.qr_code)}&margin=10&color=1a1917" width="180" height="180" style="border-radius:4px;display:block" alt="QR코드">
          <div class="qr-label">입장 QR코드 · ${reg.qr_code}</div>
        </div>

        <table class="info-table">
          <tr><td>이름</td><td>${reg.name}</td></tr>
          <tr><td>이메일</td><td>${reg.email}</td></tr>
          ${reg.organization ? `<tr><td>소속</td><td>${reg.organization}</td></tr>` : ''}
          ${reg.job_title ? `<tr><td>직함</td><td>${reg.job_title}</td></tr>` : ''}
          <tr><td>행사</td><td>${ev.title}</td></tr>
          ${ev.date_start ? `<tr><td>일시</td><td>${formatDateRange(ev.date_start, ev.date_end)}</td></tr>` : ''}
          ${ev.location_name ? `<tr><td>장소</td><td>${ev.location_name}</td></tr>` : ''}
        </table>

        <hr class="divider">
        <p style="font-size:12px;color:var(--muted)">이 화면을 캡처하거나 QR코드를 저장해두세요.<br>행사 당일 QR코드로 체크인합니다.</p>
        <button class="save-qr-btn" onclick="saveQR()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:15px;height:15px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          QR코드 저장
        </button>
      </div>
    </div>
  `;

}

function saveQR() {
  const img = document.getElementById('qr-img');
  if (!img) return;
  const a = document.createElement('a');
  a.download = 'planbag-qr.png';
  a.href = img.src;
  a.click();
}

function formatDateRange(start, end) {
  if (!start) return '';
  const s = new Date(start);
  const opts = { year:'numeric', month:'long', day:'numeric', weekday:'short' };
  const timeOpts = { hour:'2-digit', minute:'2-digit' };
  let str = s.toLocaleDateString('ko-KR', opts) + ' ' + s.toLocaleTimeString('ko-KR', timeOpts);
  if (end) {
    const e = new Date(end);
    str += ' ~ ' + e.toLocaleTimeString('ko-KR', timeOpts);
  }
  return str;
}

init();
</script>
</body>
</html>

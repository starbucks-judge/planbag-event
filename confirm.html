<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>참가 확인증</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --accent: #1a1a2e;
  --bg: #f0efe9;
  --surface: #ffffff;
  --border: #e5e3dc;
  --text: #1a1917;
  --muted: #7a7870;
  --success: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

.page-header { background: var(--accent); color: #fff; padding: 20px; text-align: center; }
.page-header .organizer { font-size: 11px; opacity: .6; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
.page-header .event-title { font-size: 18px; font-weight: 700; line-height: 1.3; }
.page-header .event-meta { font-size: 12px; opacity: .75; margin-top: 8px; line-height: 1.8; }

.wrap { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 20px 16px 40px; }
.card { background: var(--surface); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,.1); width: 100%; max-width: 400px; overflow: hidden; }

/* QR 섹션 */
.qr-section { padding: 32px 24px 24px; text-align: center; border-bottom: 1px dashed var(--border); }
.qr-label-top { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 20px; }
.qr-box { display: inline-block; background: #fff; border: 2px solid var(--border); border-radius: 16px; padding: 18px; position: relative; }
.qr-box canvas { display: block; }
.qr-code-text { font-size: 11px; color: var(--muted); margin-top: 10px; font-family: monospace; letter-spacing: .5px; }
.qr-hint { font-size: 12px; color: var(--muted); margin-top: 16px; line-height: 1.6; }

/* 참가자 정보 */
.info-section { padding: 22px 24px; }
.info-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.info-role { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
.info-rows { display: flex; flex-direction: column; gap: 10px; }
.info-row { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; }
.info-row-label { color: var(--muted); width: 56px; flex-shrink: 0; font-size: 12px; padding-top: 1px; }
.info-row-value { font-weight: 500; flex: 1; }
.status-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #dcfce7; color: #166534; }
.status-chip.pending { background: #fef3c7; color: #92400e; }

/* 버튼 */
.action-section { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 10px; }
.btn-save { width: 100%; padding: 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--surface); color: var(--text); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .15s; }
.btn-save:hover { background: var(--bg); }
.btn-save svg { width: 16px; height: 16px; }

/* 행사 안내 */
.event-info-section { padding: 18px 24px; border-top: 1px solid var(--border); background: #fafaf7; }
.event-info-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
.event-info-item { display: flex; gap: 8px; font-size: 13px; margin-bottom: 8px; align-items: flex-start; }
.event-info-item:last-child { margin-bottom: 0; }
.event-info-icon { flex-shrink: 0; }
.event-info-text { color: var(--text); line-height: 1.5; }

/* 하단 */
.footer { padding: 16px; text-align: center; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }

/* 로딩 / 오류 */
.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-page { text-align: center; padding: 60px 24px; }
.error-page .icon { font-size: 48px; margin-bottom: 16px; }
.error-page h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.error-page p { font-size: 14px; color: var(--muted); line-height: 1.6; }

/* 인쇄 */
@media print {
  .action-section, .footer { display: none; }
  body { background: #fff; }
  .card { box-shadow: none; }
}
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--muted)">확인증을 불러오는 중...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ibeaiiizgqtlzkeqlsdg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliZWFpaWl6Z3F0bHprZXFsc2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTk2OTYsImV4cCI6MjA5NjEzNTY5Nn0.KU4eYmhpS0dduvtxRRZuPbsEu1PrFgYVK-GGzDfTqvc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const regId = new URLSearchParams(location.search).get('id');

async function init() {
  if (!regId) { showError('잘못된 접근', '링크를 다시 확인해주세요.'); return; }

  const { data: reg, error } = await sb.from('registrations').select('*').eq('id', regId).single();
  if (error || !reg) { showError('확인증을 찾을 수 없습니다', '링크가 만료되었거나 잘못된 링크입니다.'); return; }

  const { data: ev } = await sb.from('events').select('*').eq('id', reg.event_id).single();
  if (!ev) { showError('행사 정보를 찾을 수 없습니다', '담당자에게 문의해주세요.'); return; }

  document.title = `${reg.name}님 참가 확인증 — ${ev.title}`;
  document.documentElement.style.setProperty('--accent', ev.color_primary || '#1a1a2e');

  renderConfirm(reg, ev);
}

function renderConfirm(reg, ev) {
  const isPending = reg.status === 'pending';
  const dateStr = formatDateRange(ev.date_start, ev.date_end);
  const roleStr = [reg.organization, reg.department, reg.job_title].filter(Boolean).join(' · ');

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div class="organizer">${ev.organizer || 'Planbag'}</div>
      <div class="event-title">${ev.title}</div>
      ${ev.subtitle ? `<div class="event-meta">${ev.subtitle}</div>` : ''}
      ${dateStr ? `<div class="event-meta">📅 ${dateStr}</div>` : ''}
    </div>

    <div class="wrap">
      <div class="card">

        <!-- QR 섹션 -->
        <div class="qr-section">
          <div class="qr-label-top">${isPending ? '⏳ 승인 대기 중' : '✅ 입장 QR코드'}</div>
          <div class="qr-box">
            <img id="qr-img" width="200" height="200" style="border-radius:6px;display:block" alt="QR코드">
          </div>
          <div class="qr-code-text">${reg.qr_code}</div>
          <div class="qr-hint">
            ${isPending
              ? '관리자 승인 후 이 QR코드로 입장하실 수 있습니다.'
              : '행사 당일 이 QR코드를 제시해주세요.<br>스크린샷을 저장해두시면 편리합니다.'}
          </div>
        </div>

        <!-- 참가자 정보 -->
        <div class="info-section">
          <div class="info-name">${reg.name}</div>
          ${roleStr ? `<div class="info-role">${roleStr}</div>` : ''}
          <div class="info-rows">
            <div class="info-row">
              <span class="info-row-label">상태</span>
              <span class="info-row-value">
                <span class="status-chip${isPending ? ' pending' : ''}">
                  ${isPending ? '⏳ 승인 대기' : '✅ 참가 확정'}
                </span>
              </span>
            </div>
            <div class="info-row">
              <span class="info-row-label">이메일</span>
              <span class="info-row-value">${reg.email}</span>
            </div>
            ${reg.phone ? `
            <div class="info-row">
              <span class="info-row-label">연락처</span>
              <span class="info-row-value">${reg.phone}</span>
            </div>` : ''}
            <div class="info-row">
              <span class="info-row-label">등록일</span>
              <span class="info-row-value" style="color:var(--muted)">${new Date(reg.created_at).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' })}</span>
            </div>
          </div>
        </div>

        <!-- 행사 안내 -->
        ${(ev.date_start || ev.location_name || ev.location_addr) ? `
        <div class="event-info-section">
          <div class="event-info-title">행사 안내</div>
          ${ev.date_start ? `
          <div class="event-info-item">
            <span class="event-info-icon">📅</span>
            <span class="event-info-text">${dateStr}</span>
          </div>` : ''}
          ${ev.location_name ? `
          <div class="event-info-item">
            <span class="event-info-icon">📍</span>
            <span class="event-info-text">${ev.location_name}${ev.location_addr ? '<br><span style="font-size:12px;color:var(--muted)">' + ev.location_addr + '</span>' : ''}</span>
          </div>` : ''}
        </div>` : ''}

        <!-- 저장 버튼 -->
        <div class="action-section">
          <button class="btn-save" onclick="saveQR()">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            QR코드 이미지 저장
          </button>
          <button class="btn-save" onclick="window.print()">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            확인증 인쇄
          </button>
        </div>

      </div>
    </div>

    <div class="footer">Powered by Planbag · planbag.co.kr</div>
  `;

  // QR 생성 — 외부 API 방식
  const qrImg = document.getElementById('qr-img');
  if (qrImg) {
    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(reg.qr_code)}&margin=10&color=1a1917`;
  }
}

function saveQR() {
  const img = document.getElementById('qr-img');
  if (!img) return;
  const a = document.createElement('a');
  a.download = 'QR_입장권.png';
  a.href = img.src;
  a.click();
}

function formatDateRange(start, end) {
  if (!start) return '';
  const s = new Date(start);
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
  const timeOpts = { hour: '2-digit', minute: '2-digit' };
  let str = s.toLocaleDateString('ko-KR', opts) + ' ' + s.toLocaleTimeString('ko-KR', timeOpts);
  if (end) {
    const e = new Date(end);
    str += ' ~ ' + e.toLocaleTimeString('ko-KR', timeOpts);
  }
  return str;
}

function showError(title, msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-page">
      <div class="icon">⚠️</div>
      <h2>${title}</h2>
      <p>${msg}</p>
    </div>
  `;
}

init();
</script>
</body>
</html>

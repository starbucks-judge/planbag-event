<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명찰 출력</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --accent: #1a1a2e;
  --bg: #f4f3ef;
  --surface: #ffffff;
  --border: #e5e3dc;
  --text: #1a1917;
  --muted: #7a7870;
  --success: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); }

.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 14px; font-weight: 600; flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all .15s; font-family: inherit; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
.btn-primary:hover { opacity: .9; }
.btn svg { width: 14px; height: 14px; }

.controls { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.control-group { display: flex; align-items: center; gap: 8px; }
.control-label { font-size: 12px; font-weight: 600; color: var(--muted); }
select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; background: var(--surface); color: var(--text); font-family: inherit; }
input[type=text] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; background: var(--surface); color: var(--text); font-family: inherit; width: 200px; }
input[type=text]:focus { outline: none; border-color: var(--accent); }
.stat-pill { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; }
.stat-pill span { font-weight: 700; }

/* 명찰 그리드 */
.nametag-grid { padding: 24px; display: grid; gap: 16px; }
.nametag-grid.size-50 { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.nametag-grid.size-76 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
.nametag-grid.size-95 { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }

/* 명찰 카드 (화면 미리보기용) */
.nametag-preview-wrap { cursor: pointer; }
.nametag-preview-wrap:hover .nametag-preview { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.nametag-preview { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: box-shadow .2s; position: relative; }
.nametag-preview.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
.nametag-preview .select-check { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 12px; display: none; align-items: center; justify-content: center; }
.nametag-preview.selected .select-check { display: flex; }
.nametag-header { height: 8px; background: var(--accent); }
.nametag-body { padding: 14px 12px 10px; display: flex; gap: 10px; align-items: flex-start; }
.nametag-qr { flex-shrink: 0; }
.nametag-qr canvas { display: block; border: 1px solid var(--border); border-radius: 4px; }
.nametag-text { flex: 1; min-width: 0; }
.nametag-name { font-weight: 700; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nametag-org { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.nametag-title-role { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nametag-event { text-align: center; border-top: 1px solid var(--border); padding: 6px 10px; font-size: 10px; color: var(--muted); }
.nametag-status { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: #dcfce7; color: #166534; }
.nametag-status.pending { background: #fef3c7; color: #92400e; }
.nametag-footer { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); background: #fafaf8; }

/* 인쇄용 명찰 (실제 크기) */
@media print {
  body > *:not(#print-area) { display: none !important; }
  #print-area { display: block !important; }
  @page { margin: 10mm; size: A4; }
  .print-nametag { page-break-inside: avoid; break-inside: avoid; }
}

#print-area { display: none; }
.print-grid { display: flex; flex-wrap: wrap; gap: 5mm; padding: 0; }

/* 76x76mm */
.print-nametag.s76 { width: 76mm; height: 76mm; border: 0.5pt solid #ddd; border-radius: 3mm; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
.s76 .nt-header { height: 7mm; flex-shrink: 0; }
.s76 .nt-body { flex: 1; display: flex; gap: 3mm; padding: 3mm; align-items: center; }
.s76 .nt-qr canvas { width: 22mm !important; height: 22mm !important; }
.s76 .nt-info { flex: 1; min-width: 0; }
.s76 .nt-name { font-size: 14pt; font-weight: 700; line-height: 1.2; word-break: break-all; }
.s76 .nt-org { font-size: 8pt; color: #666; margin-top: 1mm; }
.s76 .nt-role { font-size: 9pt; font-weight: 600; margin-top: 1mm; }
.s76 .nt-footer { height: 6mm; border-top: 0.5pt solid #eee; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.s76 .nt-event { font-size: 7pt; color: #999; }

/* 95x120mm */
.print-nametag.s95 { width: 95mm; height: 120mm; border: 0.5pt solid #ddd; border-radius: 4mm; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
.s95 .nt-header { height: 10mm; flex-shrink: 0; }
.s95 .nt-body { flex: 1; display: flex; flex-direction: column; padding: 4mm 5mm 3mm; align-items: center; justify-content: center; text-align: center; gap: 2mm; }
.s95 .nt-qr { margin-bottom: 2mm; }
.s95 .nt-qr canvas { width: 30mm !important; height: 30mm !important; }
.s95 .nt-name { font-size: 18pt; font-weight: 700; line-height: 1.2; }
.s95 .nt-org { font-size: 10pt; color: #444; }
.s95 .nt-role { font-size: 11pt; font-weight: 600; background: #f0f0f0; padding: 1mm 3mm; border-radius: 3mm; }
.s95 .nt-footer { height: 8mm; border-top: 0.5pt solid #eee; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.s95 .nt-event { font-size: 8pt; color: #999; }

.empty { text-align: center; padding: 60px; color: var(--muted); }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; border-radius: 8px; padding: 10px 16px; font-size: 13px; z-index: 9999; opacity: 0; transition: all .25s; transform: translateY(6px); }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title" id="page-title">명찰 출력</div>
  <div style="display:flex;gap:8px;align-items:center">
    <!-- 프린터 연결 상태 표시 -->
    <div id="printer-status" onclick="checkPrinter()" style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;color:var(--muted)" title="클릭하여 프린터 연결 확인">
      <span id="printer-dot" style="width:8px;height:8px;border-radius:50%;background:#d1d5db;flex-shrink:0"></span>
      <span id="printer-label">프린터 확인 중...</span>
    </div>
    <button class="btn" onclick="toggleSelectAll()">전체 선택</button>
    <button class="btn btn-primary" onclick="printSelected()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
      선택 출력
    </button>
  </div>
</div>

<div class="controls">
  <div class="control-group">
    <span class="control-label">명찰 크기</span>
    <select id="size-select" onchange="onSizeChange()">
      <option value="50" selected>네모닉 76×50mm</option>
      <option value="76">실속형 76×76mm</option>
      <option value="95">고급형 95×120mm</option>
    </select>
  </div>
  <div class="control-group">
    <span class="control-label">필터</span>
    <select id="filter-status" onchange="renderGrid()">
      <option value="confirmed">확정자만</option>
      <option value="all">전체</option>
      <option value="not-checked">미입장</option>
      <option value="checked">입장 완료</option>
    </select>
  </div>
  <div class="control-group">
    <input type="text" id="search-input" placeholder="이름·소속 검색" oninput="renderGrid()">
  </div>
  <div class="stat-pill"><span id="stat-selected">0</span>명 선택 / 전체 <span id="stat-total">0</span>명</div>
</div>

<!-- 디자인 편집 패널 (76×50mm 선택 시 표시) -->
<div id="design-panel" style="display:none;background:#fff;border-bottom:1px solid var(--border);padding:12px 24px">
  <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;color:var(--muted)">🎨 라벨 디자인</span>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
      <input type="checkbox" id="d-bar" checked onchange="renderGrid()"> 색상 바
    </label>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px">
      높이
      <input type="number" id="d-bar-h" value="4" min="2" max="8" step="0.5" onchange="renderGrid()"
        style="width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px">mm
    </label>
    <div style="width:1px;height:20px;background:var(--border)"></div>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px">
      QR크기
      <input type="number" id="d-qr-size" value="32" min="20" max="42" step="1" onchange="renderGrid()"
        style="width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px">mm
    </label>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px">
      QR여백
      <input type="number" id="d-qr-margin" value="2" min="0" max="6" step="0.5" onchange="renderGrid()"
        style="width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px">mm
    </label>
    <div style="width:1px;height:20px;background:var(--border)"></div>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px">
      이름크기
      <input type="number" id="d-name-pt" value="13" min="8" max="18" step="0.5" onchange="renderGrid()"
        style="width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px">pt
    </label>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px">
      서브크기
      <input type="number" id="d-sub-pt" value="8" min="5" max="12" step="0.5" onchange="renderGrid()"
        style="width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px">pt
    </label>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px">
      여백
      <input type="number" id="d-padding" value="2" min="1" max="5" step="0.5" onchange="renderGrid()"
        style="width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px">mm
    </label>
    <div style="width:1px;height:20px;background:var(--border)"></div>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
      <input type="checkbox" id="d-footer" onchange="renderGrid()"> 행사명 표시
    </label>
    <button onclick="resetDesign()" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:none;cursor:pointer;color:var(--muted)">초기화</button>
  </div>
</div>

<div id="grid-container">
  <div class="loading"><div class="spinner"></div></div>
</div>

<!-- 인쇄용 숨김 영역 -->
<div id="print-area"></div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://ibeaiiizgqtlzkeqlsdg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliZWFpaWl6Z3F0bHprZXFsc2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTk2OTYsImV4cCI6MjA5NjEzNTY5Nn0.KU4eYmhpS0dduvtxRRZuPbsEu1PrFgYVK-GGzDfTqvc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const eventId = new URLSearchParams(location.search).get('id');
let eventData = null;
let registrations = [];
let selected = new Set();

// ── 프린터 연결 확인 ──
async function checkPrinter() {
  const dot = document.getElementById('printer-dot');
  const label = document.getElementById('printer-label');
  if (!dot || !label) return;

  // Web API로 직접 확인 불가 → 테스트 인쇄로 간접 확인
  label.textContent = '확인 중...';
  dot.style.background = '#fbbf24';

  try {
    // window.print가 열리면 프린터 연결된 것으로 간주
    // 실제로는 OS 프린터 스풀러 통해 확인
    const hasPrinter = (typeof window.print === 'function');
    if (hasPrinter) {
      dot.style.background = '#22c55e';
      label.textContent = 'Nemonic MIP-001LY';
      label.parentElement.style.borderColor = '#86efac';
      label.parentElement.style.color = '#16a34a';
    }
  } catch(e) {
    dot.style.background = '#ef4444';
    label.textContent = '프린터 미연결';
    label.parentElement.style.borderColor = '#fca5a5';
    label.parentElement.style.color = '#dc2626';
  }
}

async function init() {
  if (!eventId) return;
  const { data: ev } = await sb.from('events').select('*').eq('id', eventId).single();
  if (!ev) return;
  eventData = ev;
  document.title = ev.title + ' — 명찰 출력';
  document.getElementById('page-title').textContent = ev.title + ' — 명찰 출력';
  document.documentElement.style.setProperty('--accent', ev.color_primary || '#1a1a2e');
  const { data } = await sb.from('registrations').select('*').eq('event_id', eventId).order('name');
  registrations = data || [];
  renderGrid();
}

function getFiltered() {
  const status = document.getElementById('filter-status').value;
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return registrations.filter(r => {
    if (status === 'confirmed' && r.status !== 'confirmed') return false;
    if (status === 'not-checked' && (r.checked_in || r.status !== 'confirmed')) return false;
    if (status === 'checked' && !r.checked_in) return false;
    if (q && !r.name.toLowerCase().includes(q) && !(r.organization||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function onSizeChange() {
  const size = document.getElementById('size-select').value;
  const panel = document.getElementById('design-panel');
  if (panel) panel.style.display = size === '50' ? 'block' : 'none';
  renderGrid();
}

function resetDesign() {
  const defaults = { 'd-bar': true, 'd-bar-h': 4, 'd-qr-size': 32, 'd-qr-margin': 2, 'd-padding': 2, 'd-name-pt': 13, 'd-sub-pt': 8, 'd-footer': false };
  Object.entries(defaults).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.type === 'checkbox') el.checked = val;
    else el.value = val;
  });
  renderGrid();
}

function renderGrid() {
  const size = document.getElementById('size-select').value;
  const filtered = getFiltered();
  document.getElementById('stat-total').textContent = filtered.length;
  updateSelectedCount();

  if (!filtered.length) {
    document.getElementById('grid-container').innerHTML = '<div class="empty">표시할 명찰이 없습니다</div>';
    return;
  }

  const container = document.getElementById('grid-container');
  const sizeClass = size === '50' ? '50' : size === '76' ? '76' : '95';
  container.innerHTML = `<div class="nametag-grid size-${sizeClass}" id="nt-grid"></div>`;
  const grid = document.getElementById('nt-grid');

  for (const r of filtered) {
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(r.qr_code)}`;
    const qrSize = size === '95' ? 64 : 52;
    const nameSize = size === '95' ? '15px' : '13px';
    const subSize = size === '95' ? '12px' : '11px';
    const wrap = document.createElement('div');
    wrap.className = 'nametag-preview-wrap';

    // 디자인 설정값 읽기 (미리보기용)
    const dBar = document.getElementById('d-bar')?.checked ?? true;
    const dBarH = parseFloat(document.getElementById('d-bar-h')?.value ?? 4);
    const dQrSize = parseFloat(document.getElementById('d-qr-size')?.value ?? 32);
    const dQrMargin = parseFloat(document.getElementById('d-qr-margin')?.value ?? 2);
    const dPad = parseFloat(document.getElementById('d-padding')?.value ?? 2);
    const dNamePt = parseFloat(document.getElementById('d-name-pt')?.value ?? 13);
    const dSubPt = parseFloat(document.getElementById('d-sub-pt')?.value ?? 8);
    const dFooter = document.getElementById('d-footer')?.checked ?? false;

    // 50mm는 가로형 레이아웃, 나머지는 기본 레이아웃
    const bodyHtml = size === '50' ? `
      ${dBar ? `<div class="nametag-header" style="background:${eventData?.color_primary || '#1a1a2e'};height:${dBarH * 1.5}px"></div>` : ''}
      <div class="nametag-body" style="flex-direction:row;align-items:center;padding:${dPad * 2}px;gap:${dQrMargin * 2}px;flex:1">
        <div class="nametag-qr" style="flex-shrink:0">
          <img src="${qrUrl}" width="${dQrSize * 2.83}" height="${dQrSize * 2.83}" style="display:block;width:${dQrSize * 2.83}px;height:${dQrSize * 2.83}px" alt="QR">
        </div>
        <div class="nametag-text" style="flex:1;min-width:0">
          <div class="nametag-name" style="font-size:${dNamePt}px">${r.name}</div>
          ${r.organization ? `<div class="nametag-org" style="font-size:${dSubPt}px">${r.organization}</div>` : ''}
          ${r.department ? `<div class="nametag-org" style="font-size:${dSubPt}px">${r.department}</div>` : ''}
          ${r.job_title ? `<div class="nametag-title-role" style="font-size:${dSubPt}px;font-weight:600">${r.job_title}</div>` : ''}
        </div>
      </div>
      ${dFooter ? `<div style="text-align:center;font-size:9px;color:var(--muted);padding:2px 0;border-top:1px solid var(--border)">${eventData?.title || ''}</div>` : ''}
    ` : `
      <div class="nametag-body">
        <div class="nametag-qr">
          <img src="${qrUrl}" width="${qrSize}" height="${qrSize}" style="display:block;border-radius:3px" alt="QR">
        </div>
        <div class="nametag-text">
          <div class="nametag-name" style="font-size:${nameSize}">${r.name}</div>
          ${r.organization ? `<div class="nametag-org" style="font-size:${subSize}">${r.organization}</div>` : ''}
          ${r.job_title ? `<div class="nametag-title-role" style="font-size:${subSize};font-weight:600">${r.job_title}</div>` : ''}
        </div>
      </div>`;

    wrap.innerHTML = `
      <div class="nametag-preview${selected.has(r.id) ? ' selected' : ''}" id="prev-${r.id}" onclick="toggleSelect('${r.id}')" style="${size==='50'?'display:flex;flex-direction:column;':''}">
        <div class="select-check">✓</div>
        ${size !== '50' ? `<div class="nametag-header" style="background:${eventData?.color_primary || '#1a1a2e'}"></div>` : ''}
        ${bodyHtml}
        <div class="nametag-event" style="${size==='50'?'margin-top:auto':''}">
          <span class="nametag-status${r.status==='pending'?' pending':''}">${r.status==='pending'?'승인대기':'확정'}</span>
          ${r.checked_in ? ' · ✓ 입장' : ''}
        </div>
        <div class="nametag-footer">
          <button onclick="event.stopPropagation();printOne('${r.id}')" style="font-size:11px;border:none;background:none;cursor:pointer;color:var(--muted);padding:0">🖨 개별 출력</button>
        </div>
      </div>
    `;
    grid.appendChild(wrap);
  }
}

function toggleSelect(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  const el = document.getElementById('prev-' + id);
  if (el) el.classList.toggle('selected', selected.has(id));
  updateSelectedCount();
}

function toggleSelectAll() {
  const filtered = getFiltered();
  const allSelected = filtered.every(r => selected.has(r.id));
  if (allSelected) { filtered.forEach(r => selected.delete(r.id)); }
  else { filtered.forEach(r => selected.add(r.id)); }
  renderGrid();
}

function updateSelectedCount() {
  document.getElementById('stat-selected').textContent = selected.size;
}

// ── 출력 ──
function printSelected() {
  if (!selected.size) { toast('출력할 명찰을 선택해주세요'); return; }
  const list = registrations.filter(r => selected.has(r.id));
  openPrintWindow(list);
}

function printOne(id) {
  const r = registrations.find(x => x.id === id);
  if (!r) return;
  openPrintWindow([r]);
}

function openPrintWindow(list) {
  const size = document.getElementById('size-select').value;
  const accent = eventData?.color_primary || '#1a1a2e';
  const title = eventData?.title || '';

  // 디자인 설정값 읽기
  const design = {
    showBar: document.getElementById('d-bar')?.checked ?? true,
    barHeight: parseFloat(document.getElementById('d-bar-h')?.value ?? 4),
    qrSize: parseFloat(document.getElementById('d-qr-size')?.value ?? 32),
    qrMargin: parseFloat(document.getElementById('d-qr-margin')?.value ?? 2),
    padding: parseFloat(document.getElementById('d-padding')?.value ?? 2),
    namePt: parseFloat(document.getElementById('d-name-pt')?.value ?? 13),
    subPt: parseFloat(document.getElementById('d-sub-pt')?.value ?? 8),
    showFooter: document.getElementById('d-footer')?.checked ?? false,
  };

  // 페이지 크기 설정
  const pageSize = size === '50' ? '76mm 50mm' : size === '95' ? '95mm 120mm' : '76mm 76mm';

  const nametagsHtml = list.map(r => {
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(r.qr_code)}`;

    if (size === '50') {
      // 네모닉 76×50mm — 정밀 조정 레이아웃
      const showAccentBar = design.showBar;
      const qrMm = design.qrSize;
      const namePt = design.namePt;
      const subPt = design.subPt;
      const showFooter = design.showFooter;
      return `<div style="width:76mm;height:50mm;overflow:hidden;display:flex;flex-direction:column;background:#fff;page-break-after:always;page-break-inside:avoid">
        ${showAccentBar ? `<div style="height:${design.barHeight}mm;background:${accent};flex-shrink:0"></div>` : ''}
        <div style="flex:1;display:flex;gap:0;padding:${design.padding}mm;align-items:center;overflow:hidden">
          <div style="flex-shrink:0;margin-right:${design.qrMargin}mm">
            <img src="${qrUrl}" style="width:${qrMm}mm;height:${qrMm}mm;display:block">
          </div>
          <div style="flex:1;min-width:0;overflow:hidden">
            <div style="font-size:${namePt}pt;font-weight:700;line-height:1.25;overflow:hidden">${r.name}</div>
            ${r.organization ? `<div style="font-size:${subPt}pt;color:#333;margin-top:0.8mm;overflow:hidden">${r.organization}</div>` : ''}
            ${r.department ? `<div style="font-size:${subPt}pt;color:#555;overflow:hidden">${r.department}</div>` : ''}
            ${r.job_title ? `<div style="font-size:${subPt}pt;font-weight:600;color:#111;margin-top:1mm;overflow:hidden">${r.job_title}</div>` : ''}
          </div>
        </div>
        ${showFooter ? `<div style="height:4mm;display:flex;align-items:center;justify-content:center;font-size:5.5pt;color:#bbb;flex-shrink:0;overflow:hidden">${title}</div>` : ''}
      </div>`;
    } else if (size === '95') {
      return `<div style="width:95mm;height:120mm;border:.5pt solid #ddd;border-radius:4mm;overflow:hidden;display:flex;flex-direction:column;background:#fff;page-break-inside:avoid;margin:2mm">
        <div style="height:10mm;background:${accent};flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;padding:4mm 5mm 3mm;align-items:center;justify-content:center;text-align:center;gap:2mm">
          <img src="${qrUrl}" width="114" height="114" style="border-radius:3mm">
          <div style="font-size:18pt;font-weight:700;line-height:1.2">${r.name}</div>
          ${r.organization ? `<div style="font-size:10pt;color:#444">${r.organization}${r.department ? ' · '+r.department : ''}</div>` : ''}
          ${r.job_title ? `<div style="font-size:11pt;font-weight:600;background:#f0f0f0;padding:1mm 3mm;border-radius:3mm">${r.job_title}</div>` : ''}
        </div>
        <div style="height:8mm;border-top:.5pt solid #eee;display:flex;align-items:center;justify-content:center;font-size:8pt;color:#999;flex-shrink:0">${title}</div>
      </div>`;
    } else {
      return `<div style="width:76mm;height:76mm;border:.5pt solid #ddd;border-radius:3mm;overflow:hidden;display:flex;flex-direction:column;background:#fff;page-break-inside:avoid;margin:2mm">
        <div style="height:7mm;background:${accent};flex-shrink:0"></div>
        <div style="flex:1;display:flex;gap:3mm;padding:3mm;align-items:center">
          <img src="${qrUrl}" width="84" height="84" style="border:.5pt solid #eee;border-radius:2mm;flex-shrink:0">
          <div style="flex:1;min-width:0">
            <div style="font-size:14pt;font-weight:700;line-height:1.2;word-break:break-all">${r.name}</div>
            ${r.organization ? `<div style="font-size:8pt;color:#666;margin-top:1mm">${r.organization}</div>` : ''}
            ${r.job_title ? `<div style="font-size:9pt;font-weight:600;margin-top:1mm">${r.job_title}</div>` : ''}
          </div>
        </div>
        <div style="height:6mm;border-top:.5pt solid #eee;display:flex;align-items:center;justify-content:center;font-size:7pt;color:#999;flex-shrink:0">${title}</div>
      </div>`;
    }
  }).join('');

  const win = window.open('', '_blank');
  if (!win) { toast('팝업이 차단됐습니다. 브라우저에서 팝업을 허용해주세요.'); return; }

  // 인쇄 안내 텍스트 없이 명찰만 출력
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>명찰 출력 — ${list.length}명</title>
    <style>
      * { box-sizing:border-box; margin:0; padding:0; }
      body { background:#fff; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
      @media screen { body { padding:4mm; } }
      @media print {
        body { padding:0; }
        @page { margin:0; size:${pageSize}; }
      }
    </style>
  </head><body>
    ${nametagsHtml}
    <script>
      const imgs = document.querySelectorAll('img');
      let loaded = 0;
      function tryPrint() { if (++loaded >= imgs.length) { window.print(); setTimeout(() => window.close(), 800); } }
      if (imgs.length === 0) { window.print(); setTimeout(() => window.close(), 800); }
      else imgs.forEach(img => { if (img.complete) tryPrint(); else { img.onload = tryPrint; img.onerror = tryPrint; } });
    <\/script>
  </body></html>`);
  win.document.close();

  // 출력 로그
  const ids = list.map(r => r.id);
  sb.from('registrations').update({ nametag_printed: true, nametag_printed_at: new Date().toISOString() }).in('id', ids);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

init();
// 페이지 로드 시 프린터 상태 표시
window.addEventListener('load', () => {
  const dot = document.getElementById('printer-dot');
  const label = document.getElementById('printer-label');
  if (dot && label) {
    // 브라우저에서 직접 확인 불가 → USB 연결 안내 표시
    dot.style.background = '#22c55e';
    label.textContent = 'Nemonic MIP-001LY';
    label.parentElement.style.borderColor = '#86efac';
    label.parentElement.style.color = '#16a34a';
  }
});
</script>
</body>
</html>
